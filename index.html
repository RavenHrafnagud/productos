<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Tarot como Guia | Panel Administrativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Manrope:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      var SC_DISABLE_SPEEDY = true;

  <body>
    <div id="root"></div>
    <div
      id="boot-fallback"
      style="position:fixed;inset:12px;z-index:9999;padding:10px 12px;border-radius:12px;background:#0f1613;color:#f6f3ea;font:12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;white-space:pre-wrap;display:none;"
    >
      Cargando interfaz...
    </div>
    <script>
      (function () {
        const panel = document.getElementById('boot-fallback');
        if (!panel) return;
        panel.style.display = 'block';
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
